<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Slop Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --accent: #c8f135;
    --accent-dark: #8fb020;
    --red: #ff4444;
    --yellow: #ffcc00;
    --green: #c8f135;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: var(--display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--accent);
  }

  header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1;
  }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
  }

  .panel {
    padding: 2rem;
    border-right: 1px solid var(--border);
  }

  .panel:last-child { border-right: none; }

  .panel-title {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  textarea {
    width: 100%;
    height: 260px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 1rem;
    resize: vertical;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    align-items: center;
  }

  button {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    padding: 0.6rem 1.2rem;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0d;
    font-weight: 500;
  }

  .btn-primary:hover { background: #d4ff50; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: #444; }

  .word-count {
    font-size: 0.72rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* Results panel */
  .result-panel {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .score-hero {
    display: flex;
    align-items: flex-end;
    gap: 1rem;
  }

  .score-number {
    font-family: var(--display);
    font-size: clamp(4rem, 10vw, 6rem);
    font-weight: 800;
    line-height: 1;
    transition: color 0.4s;
  }

  .score-label {
    padding-bottom: 0.6rem;
  }

  .score-label .verdict {
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.2rem;
  }

  .score-label .sublabel {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .score-bar-track {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s;
  }

  .signals-grid {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .signal-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 0.9rem;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .signal-row:hover { border-color: #3a3a3a; }

  .signal-left { min-width: 0; }

  .signal-name {
    font-size: 0.75rem;
    color: var(--text);
    margin-bottom: 0.35rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .signal-bar-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .signal-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .signal-detail {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .signal-pct {
    font-size: 0.75rem;
    font-weight: 500;
    min-width: 36px;
    text-align: right;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 300px;
    gap: 0.75rem;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 2.5rem;
    opacity: 0.3;
  }

  .empty-text {
    font-size: 0.8rem;
    letter-spacing: 0.06em;
  }

  .analyzing {
    display: none;
    align-items: center;
    gap: 0.5rem;
    color: var(--accent);
    font-size: 0.78rem;
  }

  .dot-flash span {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: flash 1s infinite;
  }

  .dot-flash span:nth-child(2) { animation-delay: 0.2s; }
  .dot-flash span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes flash {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  footer {
    padding: 1rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
</head>
<body>

<header>
  <h1>SLOP-O-METER</h1>
  <p>Análise heurística de padrões linguísticos de IA &mdash; 9 sinais &mdash; sem API</p>
</header>

<main>
  <div class="panel">
    <div class="panel-title">// entrada de texto</div>
    <textarea id="input" placeholder="Cole aqui o texto que deseja analisar..."></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="analyze()">Analisar</button>
      <button class="btn-ghost" onclick="clearAll()">Limpar</button>
      <span class="word-count" id="wc">0 palavras</span>
    </div>
    <div class="analyzing" id="analyzing">
      <div class="dot-flash"><span></span><span></span><span></span></div>
      processando...
    </div>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⟨ ⟩</div>
      <div class="empty-text">aguardando análise</div>
    </div>
    <div id="results" style="display:none; display:flex; flex-direction:column; gap:1.5rem;">
    </div>
  </div>
</main>

<footer>
  <span>heurísticas: padrões léxicos + análise estatística</span>
  <span id="timing"></span>
</footer>

<script>
const input = document.getElementById('input');
const wcEl = document.getElementById('wc');
const analyzing = document.getElementById('analyzing');
const emptyState = document.getElementById('empty-state');
const resultsEl = document.getElementById('results');
const timingEl = document.getElementById('timing');

input.addEventListener('input', () => {
  const words = tokenize(input.value).length;
  wcEl.textContent = words + ' palavra' + (words !== 1 ? 's' : '');
});

input.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});

function tokenize(text) {
  return (text.toLowerCase().match(/\b[a-záàâãéêíóôõúüçñ']+\b/g) || []);
}

function sentenceSplit(text) {
  return text.split(/(?<=[.!?])\s+/).filter(s => s.length > 10);
}

const AI_OPENERS = [
  /\bcertainly[,!]?\b/gi, /\bof course[,!]?\b/gi, /\babsolutely[,!]?\b/gi,
  /\bgreat question\b/gi, /\bexcellent question\b/gi,
  /\bi('d| would) be happy to\b/gi, /\bi('d| would) be glad to\b/gi,
  /\bas an ai\b/gi, /\bas a language model\b/gi,
  /\bi('m| am) here to help\b/gi, /\bfeel free to ask\b/gi,
  /\bhope (this|that) helps\b/gi, /\blet('s| us) (dive|delve|explore)\b/gi,
  /\bwithout further ado\b/gi, /\bin (this|the following) (article|post|guide|overview)\b/gi,
  /\bsuffice it to say\b/gi,
];

const AI_FILLERS = [
  'delve','tapestry','nuanced','multifaceted','pivotal','crucial','leverage',
  'utilize','comprehensive','holistic','paradigm','synergy','ecosystem',
  'robust','seamlessly','streamline','foster','empower','transformative',
  'groundbreaking','cutting-edge','innovative','revolutionize','game-changer',
  'scalable','actionable','impactful','vibrant','intricate','realm','embark',
  'journey','testament','interplay','dynamics','landscape','framework',
  'navigate','resonate','endeavor','commendable','noteworthy','furthermore',
  'moreover','nevertheless','notwithstanding','aforementioned','subsequently',
  'henceforth','thereby','wherein','thereof','thus','hence','whilst',
  'aprofundar','mergulhar','multifacetado','robusto','ecossistema','sinergia',
  'alavancar','fomentar','empoderar','transformador','inovador','revolucionário',
  'abrangente','holístico','paradigma','suavemente','otimizar',
];

const STRUCT_PATTERNS = [
  /(\n[-*•]\s.+){3,}/g,
  /\*\*[A-Z][^*]{2,40}\*\*\s*[:\n]/g,
  /\b(firstly|secondly|thirdly|fourthly|lastly)\b/gi,
  /\b(primeiro|segundo|terceiro|quarto|por último),?\s/gi,
  /\bin (conclusion|summary|closing)\b/gi,
  /\bto (summarize|conclude|wrap up)\b/gi,
  /\bem (conclusão|resumo|síntese)\b/gi,
  /\bpara (concluir|resumir|finalizar)\b/gi,
];

const HEDGE_PATTERNS = [
  /\bit('s| is) (important|worth|crucial|essential) to (note|mention|remember|consider)\b/gi,
  /\bplease note (that)?\b/gi, /\bkeep in mind (that)?\b/gi,
  /\bit('s| is) worth noting\b/gi, /\bone must (note|consider|remember)\b/gi,
  /\bé importante (notar|mencionar|lembrar|considerar)\b/gi,
  /\btenha em mente (que)?\b/gi, /\bcabe (notar|mencionar|destacar)\b/gi,
];

function countMatches(patterns, text) {
  return patterns.reduce((acc, p) => {
    const m = text.match(new RegExp(p.source, p.flags));
    return acc + (m ? m.length : 0);
  }, 0);
}

function variance(arr) {
  if (arr.length < 2) return 999;
  const mean = arr.reduce((a,b) => a+b, 0) / arr.length;
  return arr.reduce((a,b) => a + (b-mean)**2, 0) / arr.length;
}

function paragraphUniformity(text) {
  const paras = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 20);
  if (paras.length < 2) return 0;
  const lens = paras.map(p => p.length);
  const mean = lens.reduce((a,b)=>a+b,0)/lens.length;
  if (mean === 0) return 0;
  const cv = Math.sqrt(variance(lens)) / mean;
  return Math.max(0, 1 - Math.min(1, cv));
}

function runDetection(text) {
  const tokens = tokenize(text);
  const tokenCount = Math.max(tokens.length, 1);
  const sentences = sentenceSplit(text);
  const sentLengths = sentences.map(s => tokenize(s).length);

  // Signal 1: Openers
  const openerHits = countMatches(AI_OPENERS, text);
  const openerScore = Math.min(1, openerHits / 3);

  // Signal 2: Fillers
  const textLow = text.toLowerCase();
  const fillerHits = AI_FILLERS.reduce((acc, w) => {
    const re = new RegExp('\\b' + w + '\\b', 'gi');
    return acc + (textLow.match(re) || []).length;
  }, 0);
  const fillerDensity = fillerHits / (tokenCount / 100);
  const fillerScore = Math.min(1, fillerDensity / 5);

  // Signal 3: Structure
  const structHits = countMatches(STRUCT_PATTERNS, text);
  const structScore = Math.min(1, structHits / 4);

  // Signal 4: Hedging
  const hedgeHits = countMatches(HEDGE_PATTERNS, text);
  const hedgeScore = Math.min(1, hedgeHits / 3);

  // Signal 5: Sentence uniformity
  const sentVariance = variance(sentLengths);
  const unifScore = sentVariance < 999
    ? Math.max(0, 1 - Math.min(1, (sentVariance - 5) / 40))
    : 0.3;

  // Signal 6: TTR
  const ttr = new Set(tokens).size / tokenCount;
  const ttrScore = Math.max(0, 1 - Math.min(1, (ttr - 0.2) / 0.4));

  // Signal 7: Avg word length
  const awl = tokens.reduce((a,b) => a+b.length, 0) / tokenCount;
  const awlScore = Math.min(1, Math.max(0, (awl - 4.5) / 2.5));

  // Signal 8: Paragraph uniformity
  const paraScore = paragraphUniformity(text);

  // Signal 9: Avg sentence length
  const avgSL = sentLengths.length
    ? sentLengths.reduce((a,b)=>a+b,0) / sentLengths.length
    : 15;
  const avgSlScore = Math.max(0, 1 - Math.min(1, Math.abs(avgSL - 22) / 15));

  const signals = [
    { name: 'Frases de abertura IA',       score: openerScore, weight: 1.5, detail: `${openerHits} ocorrência(s)` },
    { name: 'Palavras-enchimento',          score: fillerScore, weight: 2.0, detail: `${fillerHits} hits · ${fillerDensity.toFixed(1)}/100 palavras` },
    { name: 'Estrutura formulaica',         score: structScore, weight: 1.5, detail: `${structHits} padrão(ões) detectado(s)` },
    { name: 'Hedging excessivo',            score: hedgeScore,  weight: 1.2, detail: `${hedgeHits} ocorrência(s)` },
    { name: 'Uniformidade de sentenças',    score: unifScore,   weight: 1.8, detail: `variância: ${sentVariance < 999 ? sentVariance.toFixed(1) : 'n/a'}` },
    { name: 'Diversidade lexical (TTR)',    score: ttrScore,    weight: 1.0, detail: `TTR: ${ttr.toFixed(3)}` },
    { name: 'Comprimento de palavras',      score: awlScore,    weight: 0.8, detail: `média: ${awl.toFixed(2)} chars/palavra` },
    { name: 'Uniformidade de parágrafos',   score: paraScore,   weight: 1.3, detail: `índice: ${paraScore.toFixed(2)}` },
    { name: 'Comprimento de sentença',      score: avgSlScore,  weight: 0.7, detail: `média: ${avgSL.toFixed(1)} palavras/sentença` },
  ];

  const totalWeight = signals.reduce((a,s) => a+s.weight, 0);
  const finalScore = signals.reduce((a,s) => a + s.score * s.weight, 0) / totalWeight;

  return { signals, finalScore };
}

function scoreColor(score) {
  if (score >= 0.72) return '#ff4444';
  if (score >= 0.50) return '#ffcc00';
  return '#c8f135';
}

function verdict(score) {
  if (score >= 0.75) return '🤖 Muito provável — AI Slop';
  if (score >= 0.55) return '⚠️ Suspeito — possível IA';
  if (score >= 0.35) return '🔍 Incerto — pode ser humano ou IA';
  return '✅ Provavelmente humano';
}

function analyze() {
  const text = input.value.trim();
  if (!text || text.length < 30) {
    input.focus();
    input.style.borderColor = '#ff4444';
    setTimeout(() => input.style.borderColor = '', 1500);
    emptyState.innerHTML = `<div class="empty-icon" style="opacity:0.7">⚠</div><div class="empty-text" style="color:#ff4444">texto muito curto — cole ao menos 30 caracteres</div>`;
    emptyState.style.display = 'flex';
    resultsEl.style.display = 'none';
    setTimeout(() => {
      emptyState.innerHTML = `<div class="empty-icon">⟨ ⟩</div><div class="empty-text">aguardando análise</div>`;
    }, 2500);
    return;
  }

  const t0 = performance.now();
  analyzing.style.display = 'flex';
  emptyState.style.display = 'none';
  resultsEl.style.display = 'none';

  setTimeout(() => {
    const { signals, finalScore } = runDetection(text);
    const elapsed = (performance.now() - t0).toFixed(0);

    analyzing.style.display = 'none';
    const color = scoreColor(finalScore);
    const pct = Math.round(finalScore * 100);

    resultsEl.innerHTML = `
      <div>
        <div class="panel-title">// resultado</div>
        <div class="score-hero">
          <div class="score-number" style="color:${color}">${pct}%</div>
          <div class="score-label">
            <div class="verdict" style="color:${color}">${verdict(finalScore)}</div>
            <div class="sublabel">score de AI slop</div>
          </div>
        </div>
        <div style="margin-top:1rem;">
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel-title">// sinais individuais</div>
        <div class="signals-grid">
          ${signals.map(s => {
            const sp = Math.round(s.score * 100);
            const sc = scoreColor(s.score);
            return `
            <div class="signal-row">
              <div class="signal-left">
                <div class="signal-name">${s.name}</div>
                <div class="signal-bar-track">
                  <div class="signal-bar-fill" style="width:${sp}%;background:${sc}"></div>
                </div>
                <div class="signal-detail">${s.detail}</div>
              </div>
              <div class="signal-pct" style="color:${sc}">${sp}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;

    resultsEl.style.display = 'flex';
    timingEl.textContent = `analisado em ${elapsed}ms`;
  }, 120);
}

function clearAll() {
  input.value = '';
  wcEl.textContent = '0 palavras';
  resultsEl.style.display = 'none';
  emptyState.style.display = 'flex';
  timingEl.textContent = '';
}
</script>
</body>
</html>
